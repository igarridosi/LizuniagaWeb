<body class="no-hero">
    <div class="elfsight-app-599a9fee-10bb-460f-b436-990973d0231c" data-elfsight-app-lazy></div>
    <header>
        <div id="header-menu">
            <a href="index.html"><img src="img/logo_bg.png" alt="Lizuniaga logo" id="lizuniaga-logo"></a>
            <button class="menu-toggle" aria-label="Abrir menu" aria-expanded="false">Menu</button>
            <div id="menu">
                <a rel="noopener" href="index.html">Inicio</a>
                <a rel="noopener" href="carta.html">Carta</a>
                <a rel="noopener" href="habitaciones.html">Habitaciones</a>
                <a rel="noopener" href="experiencias.html">Experiencias</a>
                <a rel="noopener" href="contacto.html">Contacto</a>
            </div>
        </div>
    </header>
    
    <section id="contacto">
        <div class="contacto-container">
            <h2>Contáctanos</h2>
            <p>Estamos aquí para responder cualquier pregunta que puedas tener sobre nuestro restaurante y hostal.</p>
            <div class="contacto-info">
                <div class="info-item">
                    <img src="img/icons/location.svg" alt="Ubicación">
                    <p>Dirección: Garaitarreta Auzoa, 26, 31780 Bera, Navarra</p>
                </div>
                <div class="info-item">
                    <img src="img/icons/telephone.svg" alt="Teléfono">
                    <p>Teléfono: 948 63 10 31</p>
                </div>
                <div class="info-item">
                    <img src="img/icons/mail.svg" alt="Email">
                    <p>Email: lizuniaga@lizuniaga.com</p>
                </div>
            </div>
            <div class="contacto-form">
                <h3>Envíanos tu mensaje</h3>
                <form id="formulario-reserva" action="https://formspree.io/f/mblrpvnd" method="POST">
                    <input type="text" name="Nombre" placeholder="Tu nombre" required>
                    <input type="email" name="Email" placeholder="Tu email" required>
                    <input type="text" name="Asunto" placeholder="Asunto" required>
                    <textarea name="Mensaje" rows="5" placeholder="Tu mensaje" required></textarea>
                    <button type="submit">Enviar</button>
                </form>
            </div>
        </div>
    </section>

    <div id="site-footer"></div>
    <script src="js/nav.js?v=5"></script>
